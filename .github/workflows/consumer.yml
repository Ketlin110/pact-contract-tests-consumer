name: Consumer Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consumer-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: Rodar testes consumer e gerar contrato
        run: npm test

      - name: Publicar contrato no PactFlow
        run: pact-broker publish ./src/contracts --consumer-app-version=${{ github.sha }} --branch=${{ github.ref_name }} --broker-base-url=${{ secrets.PACT_BROKER_URL }} --broker-token=${{ secrets.PACT_BROKER_TOKEN }}

      - name: Can I deploy?
        run: pact-broker can-i-deploy --pacticipant UserServiceConsumer --version=${{ github.sha }} --broker-base-url=${{ secrets.PACT_BROKER_URL }} --broker-token=${{ secrets.PACT_BROKER_TOKEN }} --latest